<h2 style="margin-top:20px;color:#28a745;">
    SETOR RESIDENCIAL SÃO BENTO
</h2>

<div style="background:#222;padding:15px;border-radius:10px;margin-top:15px;max-width:600px;margin-left:auto;margin-right:auto;">

    <h3>Cadastro de Visitante</h3>

    <input type="text" id="nome" placeholder="Nome Completo"
    style="width:100%;padding:10px;margin:5px 0;">

    <label>Cristão?</label>
    <select id="cristao" style="width:100%;padding:10px;margin:5px 0;">
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Não</option>
    </select>

    <input type="text" id="igreja"
    placeholder="Igreja que congrega"
    style="width:100%;padding:10px;margin:5px 0;">

    <label>Está com a família?</label>
    <select id="familia"
    onchange="mostrarFamilia()"
    style="width:100%;padding:10px;margin:5px 0;">
        <option>Não</option>
        <option>Sim</option>
    </select>

    <div id="dadosFamilia" style="display:none;">

        <input type="text"
        id="esposo"
        placeholder="Nome do esposo(a)"
        style="width:100%;padding:10px;margin:5px 0;">

        <input type="number"
        id="qtdFilhos"
        min="0"
        placeholder="Quantidade de filhos"
        onchange="gerarFilhos()"
        style="width:100%;padding:10px;margin:5px 0;">

        <div id="filhosContainer"></div>

        <input type="number"
        id="qtdOutros"
        min="0"
        placeholder="Outros acompanhantes (pais, avós, primos, etc.)"
        onchange="gerarOutros()"
        style="width:100%;padding:10px;margin:5px 0;">

        <div id="outrosContainer"></div>

    </div>

    <button onclick="enviarWhatsApp()"
    style="width:100%;padding:12px;background:#28a745;color:white;border:none;border-radius:5px;margin-top:10px;">
        Enviar Cadastro
    </button>

</div>

<script>
function mostrarFamilia() {
    const familia = document.getElementById("familia").value;

    document.getElementById("dadosFamilia").style.display =
        familia === "Sim" ? "block" : "none";
}

function gerarFilhos() {

    const qtd =
        parseInt(document.getElementById("qtdFilhos").value) || 0;

    const container =
        document.getElementById("filhosContainer");

    container.innerHTML = "";

    for(let i = 1; i <= qtd; i++) {

        container.innerHTML += `
            <input
            type="text"
            class="filho"
            placeholder="Nome do filho ${i}"
            style="width:100%;padding:10px;margin:5px 0;">
        `;
    }
}

function gerarOutros() {

    const qtd =
        parseInt(document.getElementById("qtdOutros").value) || 0;

    const container =
        document.getElementById("outrosContainer");

    container.innerHTML = "";

    for(let i = 1; i <= qtd; i++) {

        container.innerHTML += `
            <input
            type="text"
            class="outro"
            placeholder="Nome do acompanhante ${i}"
            style="width:100%;padding:10px;margin:5px 0;">
        `;
    }
}

function enviarWhatsApp() {

    let mensagem = "📋 CADASTRO DE VISITANTE\n\n";

    mensagem += "🏠 SETOR RESIDENCIAL SÃO BENTO\n\n";

    mensagem += "Nome: " +
        document.getElementById("nome").value + "\n";

    mensagem += "Cristão: " +
        document.getElementById("cristao").value + "\n";

    mensagem += "Igreja: " +
        document.getElementById("igreja").value + "\n";

    mensagem += "Com Família: " +
        document.getElementById("familia").value + "\n";

    if(document.getElementById("familia").value === "Sim") {

        mensagem += "\nEsposo(a): " +
            document.getElementById("esposo").value + "\n";

        const filhos =
            document.querySelectorAll(".filho");

        if(filhos.length > 0) {
            mensagem += "\nFILHOS:\n";

            filhos.forEach((filho, index) => {
                mensagem +=
                    `${index + 1}. ${filho.value}\n`;
            });
        }

        const outros =
            document.querySelectorAll(".outro");

        if(outros.length > 0) {
            mensagem += "\nOUTROS ACOMPANHANTES:\n";

            outros.forEach((outro, index) => {
                mensagem +=
                    `${index + 1}. ${outro.value}\n`;
            });
        }
    }

    window.open(
        "https://wa.me/?text=" +
        encodeURIComponent(mensagem),
        "_blank"
    );
}
</script>
